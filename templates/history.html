<!DOCTYPE html>
<html>
<head>
    <title>History</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 min-h-screen">

<nav class="bg-white shadow-md px-6 py-4 flex justify-between">
    <h1 class="text-xl font-bold text-blue-600">GI-AI</h1>
    <a href="/" class="text-gray-700 hover:text-blue-600">Home</a>
</nav>

<div class="p-6">

<h2 class="text-xl font-semibold mb-4">Prediction History</h2>

<div class="grid grid-cols-1 md:grid-cols-3 gap-4">

{% for item in history %}
<div class="bg-white p-4 rounded-xl shadow">

    <img src="{{ item.image }}" class="w-full h-40 object-cover rounded">

    <div class="mt-2">
        <p class="font-semibold">{{ item.prediction }}</p>
        <p class="text-sm text-gray-500">{{ item.confidence }}%</p>
        <p class="text-xs text-gray-400">{{ item.time }}</p>
    </div>

</div>
{% endfor %}

</div>

</div>

</body>
</html>
