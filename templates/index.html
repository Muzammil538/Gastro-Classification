<!DOCTYPE html>
<html>
<head>
    <title>GI Disease Classifier</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 min-h-screen">

<!-- Navbar -->
<nav class="bg-white shadow-md px-6 py-4 flex justify-between items-center">
    <h1 class="text-xl font-bold text-blue-600">Gastro Disease Classifier</h1>
    <div class="space-x-4">
        <a href="/" class="text-gray-700 hover:text-blue-600">Home</a>
        <a href="/history" class="text-gray-700 hover:text-blue-600">History</a>
    </div>
</nav>

<!-- Main -->
<div class="flex items-center justify-center mt-10">

<div class="bg-white p-8 rounded-2xl shadow-lg w-[450px]">

    <h2 class="text-xl font-semibold text-center mb-4">
        Upload Endoscopy Image
    </h2>

    <!-- Drag Drop -->
    <form method="POST" enctype="multipart/form-data" id="uploadForm">

        <label id="drop-area"
            class="flex flex-col items-center justify-center border-2 border-dashed border-gray-300 rounded-xl p-6 cursor-pointer hover:border-blue-500">

            <p class="text-gray-500">Drag & Drop Image</p>
            <p class="text-sm text-gray-400">or click to browse</p>

            <input type="file" name="image" id="fileInput" class="hidden" required>
        </label>

        <button class="mt-4 w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">
            Analyze
        </button>
    </form>

    {% if prediction %}
    <div class="mt-6 text-center">

        <img src="{{ image_path }}" class="rounded-lg mb-3 w-full h-48 object-cover">

        <div class="p-4 rounded-xl
            {% if "Invalid" in prediction %} bg-red-100
            {% elif "Low" in prediction %} bg-yellow-100
            {% else %} bg-green-100 {% endif %}">

            <p class="font-semibold">{{ prediction }}</p>
            <!-- <p class="text-sm text-gray-600">
                Confidence: {{ (confidence * 100) | round(2) }}%
            </p> -->
        </div>
    </div>
    {% endif %}

</div>
</div>

<script>
const dropArea = document.getElementById("drop-area");
const fileInput = document.getElementById("fileInput");

dropArea.addEventListener("click", () => fileInput.click());

dropArea.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropArea.classList.add("border-blue-500");
});

dropArea.addEventListener("dragleave", () => {
    dropArea.classList.remove("border-blue-500");
});

dropArea.addEventListener("drop", (e) => {
    e.preventDefault();
    fileInput.files = e.dataTransfer.files;
});
</script>

</body>
</html>
